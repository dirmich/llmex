schema_version: 2
# Qwen 조기 감사에서 같은 natural-v4 번역 계약 결함을 확인해 수집 전 기각했다.
name: gemma4-multilingual-natural-2000-v3
seed: 241
endpoint: http://macmini:11434/v1
allowed_endpoint_hosts:
  - macmini
model: gemma4-26b-a4b-uncensored-hauhaucs-balanced
api_key_env: null
run_dir: runs/distill/gemma4-multilingual-natural-2000-v3
source_chat_files:
  - data/chat/multilingual-teacher-prompts-natural-v4/gemma.jsonl
corpus: data/processed/corpus-v1.jsonl.zst
target_requests: 2000
heldout_basis_points: 1000
concurrency: 8
requests_per_second: 6.0
timeout_seconds: 180.0
max_response_bytes: 1048576
max_attempts: 5
retry_backoff_seconds: 1.0
max_retry_delay_seconds: 60.0
system_prompt: 요청한 언어로 자연스럽고 정확하게 1~2문장으로 답하세요. 질문 요청은 마지막에 짧은 질문 하나만 쓰고, 제안 요청은 질문 없이 안전하고 구체적인 제안 하나를 쓰세요. 번역 요청은 설명·따옴표·원문 반복 없이 번역문만 답하고 이름·숫자·단위를 보존하세요. 영어 요청은 영어로, 일본어 요청은 일본어로 답하세요.
max_tokens: 192
temperature: 0.2
source_collected_at: '2026-07-18'
teacher_output_license: LicenseRef-LLMEX-Internal-Distillation
min_response_chars: 2
max_response_chars: 600
max_repetition_ratio: 0.65
max_prompt_copy_ratio: 0.9
quality_gate_version: metadata-v1
unsafe_concepts:
  - name: personal-id
    patterns:
      - '주민등록번호'
      - 'social security number'
      - 'マイナンバー'
