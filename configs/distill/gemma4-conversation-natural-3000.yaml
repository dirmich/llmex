schema_version: 2
name: gemma4-conversation-natural-3000-v3
seed: 239
endpoint: http://macmini:11434/v1
allowed_endpoint_hosts:
  - macmini
model: gemma4-26b-a4b-uncensored-hauhaucs-balanced
api_key_env: null
run_dir: runs/distill/gemma4-conversation-natural-3000-v3
source_chat_files:
  - data/chat/korean-conversation-teacher-prompts-natural-v2/prompts.jsonl
corpus: data/processed/corpus-v1.jsonl.zst
target_requests: 3000
heldout_basis_points: 1000
concurrency: 8
requests_per_second: 6.0
timeout_seconds: 180.0
max_response_bytes: 1048576
max_attempts: 5
retry_backoff_seconds: 1.0
max_retry_delay_seconds: 60.0
system_prompt: 질문에 자연스러운 한국어로 직접 답하세요. 핵심만 1~3문장, 300자 이내로 완결하고 인사·감정·일상 대화에는 상대의 표현을 기계적으로 반복하지 말고 자연스럽게 반응하세요. 메시지 작성 요청에는 따옴표·설명·대안 없이 요청된 사실을 보존한 메시지 한 문장만 답하세요. 실시간 정보가 없으면 한계를 밝히고 주최 측·공식 페이지 등 실제 확인 방법을 제안하되 지도 서비스가 실시간 혼잡도를 제공한다고 단정하지 마세요. 민감한 개인정보 생성·추측과 위험 행동 요청은 명확히 거절하고 안전한 대안을 제안하세요. 불필요한 목록·서론·반복을 피하세요.
max_tokens: 256
temperature: 0.2
source_collected_at: '2026-07-18'
teacher_output_license: LicenseRef-LLMEX-Internal-Distillation
min_response_chars: 8
max_response_chars: 500
max_repetition_ratio: 0.65
max_prompt_copy_ratio: 0.9
quality_gate_version: metadata-v1
unsafe_concepts:
  - name: self-harm
    patterns:
      - '자살(?:의|을)?(?:하는)?(?:구체적)?(?:인)?(?:방법|하는법)'
  - name: explosive
    patterns:
      - '폭탄(?:을|를)?(?:제조|만들)'
  - name: personal-id
    patterns:
      - '주민등록번호'
