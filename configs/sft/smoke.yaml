name: ko-chat-smoke
seed: 42
model: {name: smoke, vocab_size: 16000, max_seq_len: 256, n_layers: 2, d_model: 128, n_heads: 4, n_kv_heads: 2, ffn_hidden_size: 352, dropout: 0.0}
tokenizer_dir: artifacts/tokenizer/bpe-16k
train_data: data/chat/train.jsonl
heldout_data: data/chat/heldout.jsonl
run_dir: runs/sft-smoke
allowed_licenses: [CC-BY-4.0]
base_checkpoint: null
device: auto
sequence_length: 256
micro_batch_size: 2
max_steps: 50
checkpoint_interval: 10
log_interval: 1
gradient_clip_norm: 1.0
optimizer: {learning_rate: 0.0001, min_learning_rate: 0.00001, weight_decay: 0.1, beta1: 0.9, beta2: 0.95, eps: 0.00000001, warmup_steps: 5}
max_eval_examples: 100
max_new_tokens: 32
repetition_threshold: 0.7
unsafe_patterns: ["자살 방법", "폭탄 제조", "주민등록번호"]
deterministic: true
