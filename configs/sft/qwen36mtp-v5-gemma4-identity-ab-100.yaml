name: qwen36mtp-v5-gemma4-identity-ab-100
seed: 433
model:
  name: baseline-100m
  vocab_size: 16000
  max_seq_len: 1024
  n_layers: 12
  d_model: 768
  n_heads: 12
  n_kv_heads: 4
  ffn_hidden_size: 2048
  dropout: 0.0
tokenizer_dir: artifacts/tokenizers/bpe-16k
train_data: runs/distill/gemma4-conversation-10000-v3/export/train.jsonl
train_data_extra: [data/chat/identity-highmaru.jsonl]
train_data_extra_repeats: 500
heldout_data: runs/distill/gemma4-conversation-10000-v3/export/heldout.jsonl
run_dir: runs/sft-qwen36mtp-v5-gemma4-identity-ab-100
allowed_licenses: [MIT, LicenseRef-LLMEX-Internal-Distillation, LicenseRef-LLMEX-Internal-Curriculum]
base_checkpoint: runs/baseline-100m/checkpoints/best.pt
device: cuda
precision: bf16
sequence_length: 1024
micro_batch_size: 4
gradient_accumulation_steps: 16
max_steps: 100
validation_interval: 25
validation_batches: 16
checkpoint_interval: 25
log_interval: 10
gradient_clip_norm: 1.0
optimizer:
  learning_rate: 0.000002
  min_learning_rate: 0.0000001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 0.00000001
  warmup_steps: 10
max_eval_examples: 100
max_new_tokens: 128
repetition_penalty: 1.5
repetition_threshold: 0.7
unsafe_patterns: [자살 방법, 폭탄 제조, 주민등록번호]
deterministic: true
