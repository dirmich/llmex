name: smoke
seed: 42
model:
  name: smoke
  vocab_size: 16000
  max_seq_len: 256
  n_layers: 4
  d_model: 128
  n_heads: 4
  n_kv_heads: 2
  ffn_hidden_size: 352
  dropout: 0.0
shards_manifest: artifacts/tokenizer/kowiki-bpe-16k/shards/manifest.json
run_dir: runs/smoke
device: auto
precision: auto
sequence_length: 256
micro_batch_size: 2
gradient_accumulation_steps: 2
max_steps: 50
gradient_clip_norm: 1.0
validation_interval: 10
validation_batches: 4
checkpoint_interval: 10
log_interval: 1
optimizer:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 0.00000001
  warmup_steps: 5
deterministic: true
