name: baseline-100m
seed: 42
model:
  name: baseline-100m
  vocab_size: 16000
  max_seq_len: 1024
  n_layers: 12
  d_model: 768
  n_heads: 12
  n_kv_heads: 4
  ffn_hidden_size: 2048
  dropout: 0.0
shards_manifest: artifacts/tokenizers/bpe-16k/shards/manifest.json
run_dir: runs/baseline-100m
device: cuda
precision: bf16
sequence_length: 1024
micro_batch_size: 4
gradient_accumulation_steps: 16
max_steps: 100000
gradient_clip_norm: 1.0
validation_interval: 500
validation_batches: 32
checkpoint_interval: 500
log_interval: 10
optimizer:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 0.00000001
  warmup_steps: 2000
deterministic: true
